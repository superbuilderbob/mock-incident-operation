name: Checkout & Lint Streamlit app

on:
  push:
    branches:
      - main

jobs:
  checkout-lint:
    name: Checkout and Lint Streamlit app code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync -p 3.14

      - name: Lint code
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"
          src: "./src"
